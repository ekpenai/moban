version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: moban-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: moban
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["--default-authentication-plugin=mysql_native_password"]

  redis:
    image: redis:7-alpine
    container_name: moban-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: moban-server
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: 123456
      DB_NAME: moban
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_LIMIT: 50mb
      CLEANUP_DAYS_LIMIT: 7
      NODE_ENV: production
      S3_ENDPOINT: https://objectstorageapi.bja.sealos.run
      S3_ACCESS_KEY: ujw2lrwn
      S3_SECRET_KEY: 26mhbpxmjdj8qrnx
      S3_BUCKET_NAME: moban-assets-0424
      S3_REGION: cn-beijing
      S3_PUBLIC_URL: https://static-host-ujw2lrwn-moban-assets-0424.sealosbja.site
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./images:/app/images

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: moban-worker
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: 123456
      DB_NAME: moban
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      - mysql
      - redis
      - server
    volumes:
      - ./uploads:/server/uploads
      - ./images:/server/images

volumes:
  mysql_data:
  redis_data:
